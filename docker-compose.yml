services:
  backend:
    image: node:20
    working_dir: /app
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-in-production}
      WRANGLER_SEND_METRICS: "false"
      CI: "true"
    # wrangler dev runs the Worker locally with a local D1 (SQLite) database,
    # persisted in ./backend/.wrangler. .dev.vars carries env into the Worker.
    command: >
      sh -c "npm install &&
             printf 'GOOGLE_CLIENT_ID=%s\nSECRET_KEY=%s\n' \"$$GOOGLE_CLIENT_ID\" \"$$SECRET_KEY\" > .dev.vars &&
             npx wrangler d1 migrations apply DB --local &&
             npx wrangler dev --ip 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"  # 8001 on the host to avoid clashing with other local services
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
