services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stockgame
      POSTGRES_PASSWORD: stockgame
      POSTGRES_DB: stockgame
    ports:
      - "5433:5432"  # 5433 on the host to avoid clashing with a local Postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockgame"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://stockgame:stockgame@db:5432/stockgame
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "8001:8000"  # 8001 on the host to avoid clashing with other local services
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
